<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260" role="img" aria-label="Gate-OS Logo">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1e2d50"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </radialGradient>

    <!-- Main accent gradient (blue → violet) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Inner glow for arch top -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow filter for gate -->
    <filter id="gateGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Card background with rounded corners ── -->
  <rect x="4" y="4" width="232" height="252" rx="28" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle hex grid bg texture -->
  <g opacity="0.06" stroke="#38bdf8" stroke-width="0.8" fill="none">
    <line x1="0"   y1="40"  x2="240" y2="40"/>
    <line x1="0"   y1="80"  x2="240" y2="80"/>
    <line x1="0"   y1="120" x2="240" y2="120"/>
    <line x1="0"   y1="160" x2="240" y2="160"/>
    <line x1="0"   y1="200" x2="240" y2="200"/>
    <line x1="40"  y1="0"   x2="40"  y2="260"/>
    <line x1="80"  y1="0"   x2="80"  y2="260"/>
    <line x1="120" y1="0"   x2="120" y2="260"/>
    <line x1="160" y1="0"   x2="160" y2="260"/>
    <line x1="200" y1="0"   x2="200" y2="260"/>
  </g>

  <!-- ── Border ring ── -->
  <rect x="4" y="4" width="232" height="252" rx="28" fill="none"
        stroke="url(#accentGrad)" stroke-width="2" opacity="0.7"/>

  <!-- ── Glow halo behind arch ── -->
  <ellipse cx="120" cy="110" rx="72" ry="72" fill="url(#glowGrad)"/>

  <!-- ── Gate arch ── -->
  <g filter="url(#gateGlow)">
    <!-- Left pillar -->
    <rect x="52" y="105" width="22" height="82" rx="5" fill="url(#accentGrad)"/>
    <!-- Right pillar -->
    <rect x="166" y="105" width="22" height="82" rx="5" fill="url(#accentGrad)"/>

    <!-- Arch (semicircle top) -->
    <path d="M52 110 Q52 42 120 42 Q188 42 188 110"
          fill="none" stroke="url(#accentGrad)" stroke-width="20"
          stroke-linecap="round"/>

    <!-- Inner arch cutout (creates the hollow gate look) -->
    <path d="M64 110 Q64 58 120 58 Q176 58 176 110"
          fill="none" stroke="#080d1a" stroke-width="10"
          stroke-linecap="round"/>
  </g>

  <!-- Keystone dot at top of arch -->
  <circle cx="120" cy="42" r="7" fill="#38bdf8"/>
  <circle cx="120" cy="42" r="4" fill="#fff" opacity="0.9"/>

  <!-- Corner circuit dots on pillars -->
  <circle cx="52"  cy="123" r="4" fill="#818cf8" opacity="0.9"/>
  <circle cx="188" cy="123" r="4" fill="#818cf8" opacity="0.9"/>
  <circle cx="52"  cy="168" r="3" fill="#38bdf8" opacity="0.7"/>
  <circle cx="188" cy="168" r="3" fill="#38bdf8" opacity="0.7"/>

  <!-- ── 5 environment indicator dots ── -->
  <!-- Labels: dev(green) gaming(amber) design(violet) media(blue) security(red) -->
  <g>
    <!-- Dev -->
    <circle cx="80"  cy="155" r="8" fill="#22c55e" opacity="0.92"/>
    <!-- Gaming -->
    <circle cx="100" cy="140" r="8" fill="#f59e0b" opacity="0.92"/>
    <!-- Design -->
    <circle cx="120" cy="135" r="8" fill="#c084fc" opacity="0.92"/>
    <!-- Media -->
    <circle cx="140" cy="140" r="8" fill="#38bdf8" opacity="0.92"/>
    <!-- Security -->
    <circle cx="160" cy="155" r="8" fill="#f87171" opacity="0.92"/>
  </g>

  <!-- Connecting line between dots -->
  <polyline points="80,155 100,140 120,135 140,140 160,155"
            fill="none" stroke="#38bdf8" stroke-width="1.5"
            stroke-dasharray="3,3" opacity="0.45"/>

  <!-- ── Divider line ── -->
  <line x1="30" y1="207" x2="210" y2="207"
        stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>

  <!-- ── "GATE-OS" logotype ── -->
  <text x="120" y="231"
        font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="700" letter-spacing="5"
        fill="url(#accentGrad)" text-anchor="middle">GATE-OS</text>

  <!-- ── Tagline ── -->
  <text x="120" y="249"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" font-weight="400" letter-spacing="2"
        fill="#64748b" text-anchor="middle">ONE OS · ALL ENVIRONMENTS</text>
</svg>
